name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build:exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: MyVMR-win-x64
          path: release/*.exe
          retention-days: 30
